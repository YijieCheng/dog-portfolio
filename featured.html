<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>精选 — 文旅影像作品集</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="system.css">
<style>
  html,body{height:100%;overflow:hidden;}
  body{background:#2743f0;}

  /* ── 蓝色画布（原参考图的粉色区域）── */
  .feat{position:relative;height:100dvh;overflow:hidden;touch-action:none; /* 触屏拖拽不触发页面滚动/回弹 */
    background:radial-gradient(120% 90% at 70% 10%,#3d5cff 0%,#2743f0 45%,#1c2fc4 100%);}

  /* 倾斜的无限平铺网格 */
  .fe-grid{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) rotate(-10deg);
    will-change:transform;touch-action:none;user-select:none;-webkit-user-select:none;}
  .fe-tile{position:absolute;left:0;top:0;display:block;will-change:transform;-webkit-user-drag:none;}
  .fe-tile .in{position:relative;width:100%;height:100%;border-radius:20px;overflow:hidden;
    isolation:isolate;box-shadow:0 18px 44px rgba(10,16,80,.35);
    transition:transform .38s cubic-bezier(.25,1,.5,1),box-shadow .38s ease;background:#14141a;}
  /* 兜底：Safari 下 overflow 圆角裁剪对合成层子元素可能失效，子元素同样加圆角 */
  .fe-tile .ph,.fe-tile img,.fe-tile .fe-txt,.fe-tile .in::after{border-radius:20px;}
  .fe-tile:hover{z-index:60;}
  .fe-tile:hover .in{transform:scale(1.045);box-shadow:0 30px 70px rgba(10,16,80,.5);}
  .fe-tile img{width:100%;height:100%;object-fit:cover;pointer-events:none;-webkit-user-drag:none;user-select:none;
    transition:transform .6s cubic-bezier(.16,1,.3,1);}
  .fe-tile:hover img{transform:scale(1.06);}

  /* 图片瓦片的悬浮信息条（暗色玻璃，克制高级） */
  .fe-tile .in::after{content:"";position:absolute;inset:0;z-index:1;pointer-events:none;
    background:linear-gradient(to top,rgba(6,8,20,.66),transparent 46%);
    opacity:0;transition:opacity .4s ease;}
  .fe-tile:hover .in::after{opacity:1;}
  .fe-cap{position:absolute;left:14px;right:14px;bottom:14px;z-index:2;display:flex;align-items:flex-end;
    justify-content:space-between;gap:12px;pointer-events:none;
    opacity:0;transform:translateY(10px);transition:opacity .4s cubic-bezier(.25,1,.5,1),transform .45s cubic-bezier(.25,1,.5,1);}
  .fe-tile:hover .fe-cap{opacity:1;transform:none;}
  .fe-cap .t{min-width:0;}
  .fe-cap .ct{font-family:var(--f-mono);font-size:8.5px;letter-spacing:.24em;text-transform:uppercase;
    color:rgba(255,255,255,.58);display:block;}
  .fe-cap .nm{display:block;font-size:15px;font-weight:700;letter-spacing:.01em;color:#fff;margin-top:4px;
    line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    text-shadow:0 2px 14px rgba(0,0,0,.45);}
  .fe-cap .pv{flex:none;width:34px;height:34px;border-radius:50%;
    border:1px solid rgba(255,255,255,.45);background:rgba(255,255,255,.08);backdrop-filter:blur(6px);
    display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;
    transition:background .3s,border-color .3s;}
  .fe-tile:hover .pv{background:rgba(255,255,255,.16);}

  /* 文字瓦片（大字排版，混入图片之间） */
  .fe-txt{width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;padding:9% 10%;}
  .fe-txt .big{font-weight:900;text-transform:uppercase;letter-spacing:-.02em;line-height:.98;
    font-size:clamp(20px,2.3vw,36px);white-space:pre-line;}
  .fe-txt .sub{margin-top:12px;font-family:var(--f-mono);font-size:10px;letter-spacing:.24em;text-transform:uppercase;opacity:.6;}

  /* 顶部 header 在蓝底上的适配 */
  .site-header{mix-blend-mode:normal;}
  .site-header.scrolled{background:transparent;backdrop-filter:none;border-bottom-color:transparent;}
  .site-header nav a{color:rgba(255,255,255,.72);}
  .site-header nav a:hover{color:#fff;}

  /* 角标 + 底部提示 */
  .fe-corner{position:absolute;z-index:10;font-family:var(--f-mono);font-size:10px;letter-spacing:.3em;
    text-transform:uppercase;color:rgba(255,255,255,.55);pointer-events:none;
    opacity:0;animation:fadeIn 1s .7s ease forwards;}
  .fe-corner.bl{left:var(--gutter);bottom:24px;}
  .fe-corner.br{right:var(--gutter);bottom:24px;color:#fff;}
  .fe-corner .ast{display:inline-block;animation:astSpin 9s linear infinite;}
  @keyframes astSpin{to{transform:rotate(360deg);}}
  .fe-hint{position:absolute;z-index:10;left:50%;bottom:22px;transform:translateX(-50%);
    background:rgba(10,14,60,.55);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.18);
    border-radius:999px;padding:10px 22px;font-family:var(--f-mono);font-size:10px;letter-spacing:.22em;
    text-transform:uppercase;color:rgba(255,255,255,.85);pointer-events:none;
    opacity:0;animation:fadeSlideUp .9s cubic-bezier(.16,1,.3,1) .6s forwards;}

  /* 入场：整个网格轻微缩放淡入 + 瓦片错峰浮现 */
  .fe-grid{opacity:0;animation:gridIn 1.1s cubic-bezier(.16,1,.3,1) .15s forwards;}
  @keyframes gridIn{from{opacity:0;transform:translate(-50%,-50%) rotate(-10deg) scale(1.08);}
                    to{opacity:1;transform:translate(-50%,-50%) rotate(-10deg) scale(1);}}
  .fe-tile .in{animation:tileIn .8s cubic-bezier(.16,1,.3,1) backwards;animation-delay:var(--d,.2s);}
  @keyframes tileIn{from{opacity:0;transform:translateY(28px) scale(.92);}
                    to{opacity:1;transform:translateY(0) scale(1);}}
  .fe-grid.no-intro .fe-tile .in{animation:none;}   /* resize 重建时不重播入场 */
  @media (prefers-reduced-motion:reduce){
    .fe-grid,.fe-tile .in{animation:none;opacity:1;}
  }

  /* ── 页面转场：暗色底 ↔ 蓝色画布互相衔接 ── */
  .page-veil{position:fixed;inset:0;z-index:500;background:#08080a;pointer-events:none;}
  .page-veil.in{animation:veilOut .55s ease .05s forwards;}          /* 进场：暗底淡出露出蓝 */
  .page-veil.out{opacity:0;animation:veilIn .18s ease-out forwards;} /* 离场：快速压暗（出比进快）*/
  @keyframes veilOut{to{opacity:0;visibility:hidden;}}
  @keyframes veilIn{to{opacity:1;}}
  @media (prefers-reduced-motion:reduce){.page-veil{display:none;}}

  /* ── 移动端 ── */
  @media(max-width:720px){
    .fe-corner{display:none;}                       /* 角标与居中提示会相互挤压 */
    .fe-hint{bottom:18px;padding:9px 16px;font-size:9px;letter-spacing:.18em;white-space:nowrap;}
  }
  /* 触屏没有 hover：标题信息常显，否则瓦片全程匿名 */
  @media (hover:none){
    .fe-tile .in::after{opacity:1;}
    .fe-cap{opacity:1;transform:none;}
    .fe-cap .nm{font-size:13px;}
  }
</style>
</head>
<body>

<div class="page-veil in" id="veil" aria-hidden="true"></div>

<header class="site-header">
  <div class="logo"><a href="index.html" data-hover>ARCHIVE<span class="dot-accent">.</span></a></div>
  <nav><ul>
    <li><a href="works.html#photo" data-hover>摄影</a></li>
    <li><a href="works.html#video" data-hover>摄像</a></li>
    <li><a href="featured.html" data-hover style="color:#fff;">精选</a></li>
    <li><a href="about.html" data-hover>关于我</a></li>
  </ul></nav>
  <span class="menu-ico" data-hover>≡</span>
</header>

<section class="feat" id="feat">
  <div class="fe-grid" id="feGrid"></div>
  <span class="fe-corner bl">© 2026 Archive Studio</span>
  <span class="fe-corner br">Featured <span class="ast">✳</span></span>
  <div class="fe-hint">∞ 左右拖拽 · 点击查看作品</div>
</section>

<script src="data.js"></script>
<script src="site.js"></script>
<script>
/* ── 精选清单：改这里即可增删精选作品（catKey/projId）── */
var FEATURED=[
  'creative/ningbo-city',
  'creative/mountains-sea',
  'documentary/craftsman',
  'events/marathon',
  'ad/brand-tvc',
  'interview/street',
  'explore/museum',
  'p-landscape/mountain',
  'p-landscape/city-night',
  'p-portrait/studio-portrait'
];

/* 混排的文字瓦片（参考图里的大字卡片） */
var TEXTS=[
  {t:'精选作品',s:'Selected Works',bg:'#f3ece1',fg:'#ff4a1f'},
  {t:'WE CAPTURE\nSTORIES',s:'',bg:'#ff4a1f',fg:'#f3ece1'},
  {t:'山海·城市·人文',s:'Archive Studio',bg:'#6c30d2',fg:'#ffffff'},
  {t:'SEE OUR WORK\nIN ACTION',s:'',bg:'#0e1a5e',fg:'#9db4ff'},
  {t:'影像·创意·叙事',s:'Visual Storytelling',bg:'#f3ece1',fg:'#1d44c7'}
];

/* ── 离场转场：先压暗再跳转（180ms，与 veilIn 同步）── */
var _veil=document.getElementById('veil');
function veilNav(href){
  if(!_veil||matchMedia('(prefers-reduced-motion:reduce)').matches){location.href=href;return;}
  _veil.classList.remove('in');_veil.classList.add('out');
  setTimeout(function(){location.href=href;},180);
}
/* bfcache 返回本页时重播进场，避免残留暗屏 */
addEventListener('pageshow',function(e){
  if(e.persisted&&_veil){_veil.classList.remove('out');void _veil.offsetWidth;_veil.classList.add('in');}
});
/* header 导航也走转场 */
document.querySelectorAll('.site-header a[href]').forEach(function(a){
  a.addEventListener('click',function(e){e.preventDefault();veilNav(a.getAttribute('href'));});
});

(function(){
  var grid=document.getElementById('feGrid');
  var feat=document.getElementById('feat');
  var reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;

  var items=FEATURED.map(function(r){return PROJECTS[r]?Object.assign({route:r},PROJECTS[r]):null;})
                    .filter(Boolean);

  /* 图片瓦片 + 每两个混入一张文字瓦片 */
  var seq=[],ti=0;
  items.forEach(function(p,i){
    seq.push({type:'work',p:p,i:i});
    if(i%2===1){seq.push({type:'text',x:TEXTS[ti%TEXTS.length]});ti++;}
  });

  function tileHTML(s,idx){
    if(s.type==='text'){
      return '<div class="in"><div class="fe-txt" style="background:'+s.x.bg+';color:'+s.x.fg+';">'+
        '<div class="big">'+s.x.t.replace(/\n/g,'<br>')+'</div>'+
        (s.x.s?'<div class="sub">'+s.x.s+'</div>':'')+'</div></div>';
    }
    var p=s.p;
    return '<div class="in"><div class="ph" style="position:absolute;inset:0;">'+
      '<img draggable="false" data-fallback src="https://picsum.photos/seed/'+encodeURIComponent(p.id)+'/800/560" alt=""></div>'+
      '<div class="fe-cap"><span class="t">'+
      '<span class="ct">'+p.catCn+' · '+(p.year||'')+'</span>'+
      '<span class="nm">'+p.cn+'</span></span>'+
      '<span class="pv">'+(p.group==='video'?'▶':'↗')+'</span></div></div>';
  }

  /* ── 尺寸与行列 ── */
  var CW,CH,GAP,STEP,rows,totalW,gw,gh;
  var tiles=[],built=false;
  function build(){
    grid.innerHTML='';tiles=[];
    if(built)grid.classList.add('no-intro');   /* 仅首次进场播放动画 */
    CW=Math.max(230,Math.min(innerWidth*0.24,380));CH=CW*0.68;
    GAP=Math.max(16,Math.min(innerWidth*0.016,26));STEP=CW+GAP;
    gw=Math.hypot(innerWidth,innerHeight)*1.25;   /* 旋转后仍能盖满全屏 */
    gh=gw;
    grid.style.width=gw+'px';grid.style.height=gh+'px';

    /* 行内瓦片总宽必须超过网格宽，否则整段复制直到够循环 */
    var rowSeq=seq.slice();
    while(rowSeq.length*STEP<gw+STEP*2){rowSeq=rowSeq.concat(seq);}
    totalW=rowSeq.length*STEP;

    var nRows=Math.ceil(gh/(CH+GAP))+1;
    for(var r=0;r<nRows;r++){
      for(var i=0;i<rowSeq.length;i++){
        /* 每行错位取序列，避免同列重复 */
        var s=rowSeq[(i+r*3)%rowSeq.length];
        var el;
        if(s.type==='work'){el=document.createElement('a');el.href='project.html?from=featured#'+s.p.route;}
        else{el=document.createElement('span');}
        el.className='fe-tile';
        el.setAttribute('draggable','false');
        el.addEventListener('dragstart',function(e){e.preventDefault();});
        el.innerHTML=tileHTML(s,i);
        el.style.width=CW+'px';el.style.height=CH+'px';
        el.style.setProperty('--d',(0.2+((i*3+r*5)%8)*0.06).toFixed(2)+'s');  /* 错峰入场 */
        grid.appendChild(el);
        tiles.push({el:el,row:r,baseX:i*STEP,y:r*(CH+GAP),
          brick:(r%2)*(STEP/2),speed:1+((r%3)-1)*0.12});   /* 相邻行轻微视差 */
      }
    }
    attachImgFallback(grid);
  }
  build();built=true;
  addEventListener('resize',build);

  /* ── 无限循环定位：取模回绕 ── */
  function mod(a,n){return ((a%n)+n)%n;}
  var pos=0,target=0,vel=0,dragging=false,lastX=0,lastY=0,moved=0;
  var AUTO=reduce?0:0.25;

  (function frame(){
    if(!dragging){
      target+=AUTO;
      target+=vel;vel*=0.93;if(Math.abs(vel)<0.02)vel=0;
    }
    pos+=(target-pos)*0.14;
    for(var k=0;k<tiles.length;k++){
      var t=tiles[k];
      var x=mod(t.baseX - pos*t.speed + t.brick, totalW) - STEP;
      t.el.style.transform='translate3d('+x+'px,'+t.y+'px,0)';
    }
    requestAnimationFrame(frame);
  })();

  /* ── 拖拽 / 滚轮（沿网格自身坐标换算，旋转下手感依旧跟手）── */
  var COS=Math.cos(-10*Math.PI/180),SIN=Math.sin(-10*Math.PI/180);
  feat.addEventListener('pointerdown',function(e){
    e.preventDefault();dragging=true;vel=0;lastX=e.clientX;lastY=e.clientY;moved=0;
    if(window._setCursorGrab)window._setCursorGrab(true);
    feat.setPointerCapture(e.pointerId);
  });
  feat.addEventListener('pointermove',function(e){
    if(!dragging)return;
    var dx=e.clientX-lastX,dy=e.clientY-lastY;lastX=e.clientX;lastY=e.clientY;
    var d=dx*COS+dy*SIN;              /* 屏幕位移投影到倾斜轴 */
    moved+=Math.abs(dx)+Math.abs(dy);
    target-=d;vel=-d*0.55;
  });
  function up(e){
    if(!dragging)return;dragging=false;
    if(window._setCursorGrab)window._setCursorGrab(false);
    if(moved<6){
      var el=document.elementFromPoint(e.clientX,e.clientY);
      while(el&&el!==feat){
        if(el.classList&&el.classList.contains('fe-tile')&&el.tagName==='A'){veilNav(el.getAttribute('href'));return;}
        el=el.parentElement;
      }
    }
  }
  feat.addEventListener('pointerup',up);
  feat.addEventListener('pointercancel',function(){dragging=false;if(window._setCursorGrab)window._setCursorGrab(false);});
  addEventListener('wheel',function(e){target+=(Math.abs(e.deltaX)>Math.abs(e.deltaY)?e.deltaX:e.deltaY)*0.8;},{passive:true});
})();
</script>
</body>
</html>

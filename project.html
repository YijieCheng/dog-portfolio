<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>项目 — 文旅影像作品集</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="system.css">
<style>
  html,body{height:100%;overflow:hidden;}
  .player-page{position:relative;height:100dvh;overflow:hidden;background:var(--bg);}
  .player-page .orb{left:78%;top:-6%;width:min(420px,56vw);height:min(420px,56vw);opacity:.5;}
  .player-wrap{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;padding-top:84px;padding-bottom:16px;}

  /* ── 顶部信息栏 ── */
  .player-top{flex:none;display:flex;align-items:center;justify-content:space-between;gap:var(--s4);padding-bottom:10px;}
  .fs-btn{flex:none;font-family:var(--f-mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--muted);border:1px solid var(--border);border-radius:999px;padding:8px 16px;background:var(--panel);
    display:inline-flex;align-items:center;gap:7px;cursor:pointer;transition:color .3s,border-color .3s;}
  .fs-btn:hover{color:var(--accent);border-color:rgba(168,130,255,.5);}
  .fs-btn:active{transform:scale(.96);}
  .player-top .ptop-left{display:flex;align-items:center;gap:14px;flex-wrap:wrap;min-width:0;}
  .back-btn{font-family:var(--f-mono);font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
    display:inline-flex;align-items:center;gap:6px;transition:color .3s;flex:none;}
  .back-btn:hover{color:var(--text);}
  .ptop-title{font-size:19px;font-weight:700;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .ptop-title .sub{color:var(--muted);font-weight:400;margin-left:10px;font-size:13px;font-family:var(--f-mono);letter-spacing:.06em;}

  /* ── 播放舞台：占满约 80% 屏幕高度 ── */
  .player-stage{position:relative;flex:1 1 80%;min-height:0;margin:10px 0;border-radius:14px;overflow:hidden;
    background:#0c0c10;border:1px solid var(--border);}
  .player-stage .p-blur{position:absolute;inset:-30px;background-size:cover;background-position:center;
    filter:blur(46px) brightness(.55) saturate(1.1);transform:scale(1.2);opacity:0;transition:opacity .4s ease;}
  .player-stage.is-vertical .p-blur{opacity:1;}
  .player-stage .p-media{position:absolute;inset:0;z-index:1;display:flex;align-items:center;justify-content:center;}
  .player-stage .p-media img,.player-stage .p-media video{width:100%;height:100%;object-fit:cover;}
  .player-stage.is-vertical .p-media img,.player-stage.is-vertical .p-media video{width:auto;height:100%;object-fit:contain;}
  .player-stage .p-media iframe{width:100%;height:100%;border:0;}
  .player-stage.is-vertical .p-media iframe{width:auto;height:100%;aspect-ratio:9/16;max-width:100%;}
  /* 抖音横向片：播放器恒为竖屏 9:16，具体尺寸由 JS 按舞台比例计算（画面带完整收进舞台，不裁字幕） */
  .player-stage.is-dycrop .p-media iframe{flex:none;}
  /* 播放中：完整画面优先，不裁切（横竖屏视频通用），底衬毛玻璃 */
  .player-stage.is-playing .p-media video{object-fit:contain;}
  .player-stage.is-playing .p-blur{opacity:1;}
  .p-play{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:2;cursor:pointer;}
  .player-stage.is-playing .p-play{display:none;}
  .p-play .play{width:78px;height:78px;background:rgba(0,0,0,.32);border-color:rgba(255,255,255,.85);}
  .p-play .play::after{border-left-width:20px;border-top-width:13px;border-bottom-width:13px;}
  .p-play:hover .play{background:rgba(168,130,255,.3);border-color:transparent;transform:scale(1.06);}

  /* ── 底部缩略图带 ── */
  .thumb-strip{flex:none;display:flex;align-items:center;gap:10px;height:100px;margin-top:10px;}
  .ts-track{flex:1;min-width:0;display:flex;gap:12px;overflow-x:auto;scroll-behavior:smooth;scrollbar-width:none;padding:2px 1px;}
  .ts-track::-webkit-scrollbar{display:none;}
  .ts-item{flex:none;width:150px;height:96px;border-radius:8px;overflow:hidden;position:relative;
    border:2px solid transparent;opacity:.55;transition:opacity .3s,border-color .3s,transform .3s;background:#14141a;}
  .ts-item img{width:100%;height:100%;object-fit:cover;}
  .ts-item::after{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.75),transparent 55%);}
  .ts-item .ts-no{position:absolute;left:7px;top:6px;z-index:1;font-family:var(--f-mono);font-size:9px;color:rgba(255,255,255,.75);}
  .ts-item .ts-nm{position:absolute;left:8px;bottom:6px;right:8px;z-index:1;font-size:11px;color:#fff;font-weight:600;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .ts-item:hover{opacity:.85;}
  .ts-item.is-active{opacity:1;border-color:var(--accent);transform:translateY(-3px);}
  .ts-nav{flex:none;width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--panel);
    color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:15px;
    transition:color .3s,border-color .3s;}
  .ts-nav:hover{color:var(--accent);border-color:rgba(168,130,255,.5);}

  /* 全屏态：去圆角边框 */
  .player-stage:fullscreen{border-radius:0;border:0;}
  .player-stage:fullscreen .p-media iframe,.player-stage:fullscreen .p-media video{width:100%;height:100%;aspect-ratio:auto;object-fit:contain;}

  @media(max-width:720px){
    .player-wrap{padding-top:88px;}
    /* 横屏内容在竖屏手机上完整显示（contain + 毛玻璃衬底），不再裁切 */
    .player-stage.is-horizontal .p-media img,
    .player-stage.is-horizontal .p-media video{object-fit:contain;}
    .player-stage.is-horizontal .p-blur{opacity:1;}
    .fs-btn{padding:7px 13px;font-size:10px;}
    .ptop-title{max-width:none;min-width:0;font-size:16px;}
    .ptop-title .sub{display:none;}          /* 英文副题小屏必溢出 */
    .ts-item{width:120px;height:80px;}
    .thumb-strip{height:88px;gap:8px;}
    .ts-nav{display:none;}                   /* 触屏直接横滑，箭头让位 */
    .p-play .play{width:64px;height:64px;}
  }

  /* ── 触屏设备横屏：横向内容完整显示，字幕不被裁 ── */
  @media (orientation:landscape) and (hover:none){
    .player-stage.is-horizontal .p-media img,
    .player-stage.is-horizontal .p-media video{object-fit:contain;}
    .player-stage.is-horizontal .p-blur{opacity:1;}
  }
  /* 手机横屏（矮屏）：观影优先，收起缩略图带给画面让高度 */
  @media (orientation:landscape) and (hover:none) and (max-height:500px){
    .player-wrap{padding-top:78px;padding-bottom:10px;}
    .player-top{padding-bottom:6px;}
    .thumb-strip{display:none;}
    .player-stage{margin:4px 0;}
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="logo"><a href="index.html" data-hover>ARCHIVE<span class="dot-accent">.</span></a></div>
  <nav><ul>
    <li><a href="works.html#photo" data-hover>摄影</a></li>
    <li><a id="navWorks" href="works.html#video" data-hover>摄像</a></li>
    <li><a href="featured.html" data-hover>精选</a></li>
    <li><a href="about.html" data-hover>关于我</a></li>
  </ul></nav>
  <span class="menu-ico" data-hover>≡</span>
</header>

<section class="player-page">
  <div class="orb" id="orb"></div>
  <div class="wrap player-wrap">

    <div class="player-top">
      <div class="ptop-left">
        <a class="back-btn" id="backLink" href="category.html" data-hover>← 返回</a>
        <div class="ptop-title" id="ptopTitle">宁波城市宣传片<span class="sub">NINGBO CITY PROMO</span></div>
      </div>
      <button class="fs-btn" id="fsBtn" data-hover>⛶ 全屏播放</button>
    </div>

    <div class="player-stage" id="stage">
      <div class="p-blur" id="pBlur"></div>
      <div class="p-media" id="pMedia"></div>
    </div>

    <div class="thumb-strip">
      <button class="ts-nav" id="tsPrev" data-hover>‹</button>
      <div class="ts-track" id="tsTrack"></div>
      <button class="ts-nav" id="tsNext" data-hover>›</button>
    </div>

  </div>
</section>

<script src="data.js"></script>
<script src="site.js"></script>
<script>
function render(route){
  var p=PROJECTS[route];
  if(!p){p=PROJECTS['creative/ningbo-city'];route='creative/ningbo-city';}
  var c=CATS[p.catKey];
  var isPhoto=p.group==='photo';
  document.title=p.cn+' — 文旅影像作品集';

  var lb=(parseInt(p.catNo)*10)+p.cn.length;
  var imgSrc=p.vertical?imgURL(p.kw,900,1600,lb):imgURL(p.kw,1600,900,lb);

  /* 从精选页进入时，返回按钮回精选页 */
  var backLink=document.getElementById('backLink');
  if(/[?&]from=featured/.test(location.search)){
    backLink.href='featured.html';backLink.innerHTML='← 返回精选';
  }else{
    backLink.href='category.html#'+p.catKey;backLink.innerHTML='← 返回';
  }

  document.getElementById('ptopTitle').innerHTML=p.cn+(p.en?'<span class="sub">'+p.en+'</span>':'');

  var stage=document.getElementById('stage');
  stage.classList.toggle('is-vertical',!!p.vertical);
  stage.classList.toggle('is-horizontal',!p.vertical);
  stage.classList.remove('is-playing','is-dycrop');
  document.getElementById('pBlur').style.backgroundImage="url('"+imgSrc+"')";

  var mediaWrap=document.getElementById('pMedia');
  mediaWrap.innerHTML='<img data-fallback id="pImg" src="'+imgSrc+'" alt="'+p.cn+'">'+
    (isPhoto?'':'<span class="p-play" id="playBtn" data-hover><span class="play"></span></span>');

  function showNotice(title,html){
    stage.classList.add('is-playing');
    mediaWrap.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:24px;">'+
      '<div style="font-family:var(--f-mono);font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--accent);">'+title+'</div>'+
      '<div style="font-size:14px;color:var(--muted);line-height:2;">'+html+'</div></div>';
  }
  function playVideo(){
    /* 本地/自托管视频优先：原片直出，清晰度最高 */
    if(p.video){
      stage.classList.add('is-playing');
      mediaWrap.innerHTML='<video src="'+p.video+'" autoplay controls playsinline></video>';
      mediaWrap.querySelector('video').addEventListener('error',function(){
        showNotice('VIDEO FILE NOT FOUND',
          '未找到本地原片 <b style="color:var(--text);">'+p.video+'</b><br>'+
          '把原始视频文件放入 assets 文件夹后刷新即可站内播放');
      });
      return;
    }
    /* 微信视频号：仅限微信 App 内观看，站外无法嵌入 */
    if(p.sph){
      showNotice('WECHAT ONLY',
        '该作品发布于微信视频号，微信限制仅能在 App 内观看<br>'+
        '如需站内播放，请提供原片文件或腾讯视频 / B 站链接');
      return;
    }
    stage.classList.add('is-playing');
    if(p.bilibili){
      mediaWrap.innerHTML='<iframe src="https://player.bilibili.com/player.html?bvid='+p.bilibili+'&page=1&high_quality=1&danmaku=0&autoplay=1" scrolling="no" frameborder="0" allowfullscreen="true"></iframe>';
    }else if(p.qq){
      mediaWrap.innerHTML='<iframe src="https://v.qq.com/txp/iframe/player.html?vid='+p.qq+'&auto=1&defn=shd" scrolling="no" frameborder="0" allowfullscreen="true"></iframe>';
    }else if(p.douyin){
      /* 抖音竖屏播放器：横向片(非 vertical)按舞台比例定尺寸，画面带完整显示（不裁字幕） */
      if(!p.vertical) stage.classList.add('is-dycrop');
      stage.dataset.ratio=p.ratio||'';
      mediaWrap.innerHTML='<iframe src="https://open.douyin.com/player/video?vid='+p.douyin+'&autoplay=1" scrolling="no" frameborder="0" allow="fullscreen" allowfullscreen="true"></iframe>';
      fitDycrop();
    }else{
      mediaWrap.innerHTML='<video src="assets/hero-figure.mp4" autoplay muted loop playsinline controls></video>';
    }
  }
  var fsBtn=document.getElementById('fsBtn');
  if(isPhoto){
    mediaWrap.style.cursor='zoom-in';
    mediaWrap.onclick=function(){window.open(imgSrc,'_blank');};
    fsBtn.style.display='none';
  }else{
    mediaWrap.style.cursor='';
    mediaWrap.onclick=null;
    var pb=document.getElementById('playBtn');if(pb)pb.onclick=playVideo;

    /* ── 全屏播放：优先原生全屏（横屏片同时锁定横向），iPhone 等不支持时另开独立播放器 ── */
    fsBtn.style.display=p.sph?'none':'';   /* 视频号无法站外播放，不给全屏入口 */
    fsBtn.onclick=function(){
      if(!stage.classList.contains('is-playing'))playVideo();
      function openExternal(){
        var url=p.video||null;
        if(p.bilibili)url='https://player.bilibili.com/player.html?bvid='+p.bilibili+'&page=1&high_quality=1&danmaku=0&autoplay=1';
        else if(p.qq)url='https://v.qq.com/txp/iframe/player.html?vid='+p.qq+'&auto=1&defn=shd';
        else if(p.douyin)url='https://open.douyin.com/player/video?vid='+p.douyin+'&autoplay=1';
        if(url)window.open(url,'_blank');
      }
      if(document.fullscreenEnabled&&stage.requestFullscreen){
        stage.requestFullscreen().then(function(){
          /* 横屏片：全屏后锁定横向（仅移动端支持，失败静默） */
          if(!p.vertical&&screen.orientation&&screen.orientation.lock){
            screen.orientation.lock('landscape').catch(function(){});
          }
        }).catch(openExternal);
        return;
      }
      /* iPhone Safari：div 不支持全屏，本地视频走原生播放器，其余另开页 */
      var v=mediaWrap.querySelector('video');
      if(v&&v.webkitEnterFullscreen){try{v.webkitEnterFullscreen();return;}catch(e){}}
      openExternal();
    };
  }

  // 底部缩略图：同分类其它作品，点击页面内直接切换
  var strip=document.getElementById('tsTrack');
  strip.innerHTML=c.projects.map(function(pp,i){
    var thumb=imgURL(pp.kw,300,200,(c.no*10)+i);
    return '<a class="ts-item'+(pp.id===p.id?' is-active':'')+'" href="#'+p.catKey+'/'+pp.id+'" data-hover>'+
      '<img data-fallback src="'+thumb+'" alt="'+pp.cn+'">'+
      '<span class="ts-no">'+('0'+(i+1)).slice(-2)+'</span>'+
      '<span class="ts-nm">'+pp.cn+'</span></a>';
  }).join('');

  attachImgFallback();
}
function current(){return location.hash.replace('#','')||'creative/ningbo-city';}
addEventListener('hashchange',function(){render(current());});
render(current());
initOrb(document.getElementById('orb'));

/* ── 抖音横向片尺寸计算：9:16 播放器中间的画面带完整收进舞台 ──
   带高 = 播放器宽 ÷ 画幅，故 播放器宽 = min(舞台宽, 舞台高 × 画幅 × 0.97)。
   画幅保守假设 16:10（=1.6）：实际更宽的片（16:9、2:1）只会余量更多，绝不裁；
   个别特殊画幅可在 data.js 该作品上加 ratio 字段覆盖（如 ratio:1.78）。 */
function fitDycrop(){
  var stage=document.getElementById('stage');
  if(!stage.classList.contains('is-dycrop'))return;
  var f=document.getElementById('pMedia').querySelector('iframe');
  if(!f)return;
  var rect=stage.getBoundingClientRect();
  var ratio=parseFloat(stage.dataset.ratio)||1.6;
  var w=Math.min(rect.width, rect.height*ratio*0.97);
  f.style.width=w+'px';
  f.style.height=(w*16/9)+'px';
}
addEventListener('resize',fitDycrop);   /* 旋转屏幕 / 进出全屏时重算 */

/* 退出全屏时解除横屏锁定 */
document.addEventListener('fullscreenchange',function(){
  if(!document.fullscreenElement&&screen.orientation&&screen.orientation.unlock){
    try{screen.orientation.unlock();}catch(e){}
  }
});

document.getElementById('tsPrev').onclick=function(){document.getElementById('tsTrack').scrollBy({left:-320,behavior:'smooth'});};
document.getElementById('tsNext').onclick=function(){document.getElementById('tsTrack').scrollBy({left:320,behavior:'smooth'});};
</script>
</body>
</html>

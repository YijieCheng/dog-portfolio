<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作品分类 — 文旅影像作品集</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="system.css">
<style>
  .works-sec .orb{left:68%;top:12%;opacity:.5;}
  .works-reveal{opacity:0;transform:translateY(14px);transition:opacity .6s ease,transform .6s cubic-bezier(.16,1,.3,1);}
  .works-reveal.show{opacity:1;transform:none;}
</style>
</head>
<body>

<header class="site-header">
  <div class="logo"><a href="index.html" data-hover>ARCHIVE<span class="dot-accent">.</span></a></div>
  <nav><ul>
    <li><a href="works.html#photo" data-hover>摄影</a></li>
    <li><a href="works.html#video" data-hover>摄像</a></li>
    <li><a href="featured.html" data-hover>精选</a></li>
    <li><a href="about.html" data-hover>关于我</a></li>
  </ul></nav>
  <span class="menu-ico" data-hover>≡</span>
</header>

<section class="section works-sec">
  <div class="orb" id="orb"></div>
  <div class="wrap">
    <div class="works-head works-reveal" id="worksHead">
      <div class="eyebrow on" id="typeEn">VIDEOGRAPHY</div>
      <h1 class="works-title" id="typeCn">摄像作品</h1>
    </div>
    <div class="cat-list" id="catList"></div>
  </div>
</section>

<footer class="section tight" style="padding-top:0;">
  <div class="wrap"><div class="site-footer">
    <div class="l"><a href="index.html" data-hover>Home</a><a href="featured.html" data-hover>精选</a><a href="about.html" data-hover>关于我</a></div>
    <div class="copy">© 2026 ARCHIVE STUDIO · 文旅影像作品集</div>
  </div></div>
</footer>

<script src="data.js"></script>
<script src="site.js"></script>
<script>
function splitChars(s){
  return s.split('').map(function(ch,i){
    return '<span class="ch" style="transition-delay:'+(i*45)+'ms">'+ch+'</span>';
  }).join('');
}
function rowHTML(c){
  return '<a class="cat-row" data-hover href="category.html#'+c.key+'">'+
    '<span class="cat-ghost" aria-hidden="true">'+c.en+'</span>'+
    '<span class="cat-bar"><span class="cat-cn">'+splitChars(c.cn)+'</span>'+
    '<span class="cat-arrow">↗</span></span>'+
    '<span class="cat-tag">'+c.en+'</span></a>';
}
function render(type){
  var g=GROUPS[type]||GROUPS.video; type=g.key;
  document.title=g.cn+' — 文旅影像作品集';
  document.getElementById('typeEn').textContent=g.en;
  document.getElementById('typeCn').textContent=g.cn;

  var list=document.getElementById('catList');
  list.innerHTML=g.order.map(function(k){return rowHTML(CATS[k]);}).join('');

  var rows=[].slice.call(list.querySelectorAll('.cat-row'));
  if(!('IntersectionObserver' in window)){rows.forEach(function(r){r.classList.add('in');});}
  else{
    var io=new IntersectionObserver(function(es){
      es.forEach(function(e){
        if(e.isIntersecting){
          e.target.style.animationDelay=(rows.indexOf(e.target)*55)+'ms';
          e.target.classList.add('in');io.unobserve(e.target);
        }
      });
    },{threshold:.15});
    rows.forEach(function(r){io.observe(r);});
  }
  window.scrollTo(0,0);
}
function current(){return (location.hash==='#photo'||location.hash==='#video')?location.hash.slice(1):'video';}
addEventListener('hashchange',function(){render(current());});
render(current());
initOrb(document.getElementById('orb'));
requestAnimationFrame(function(){document.getElementById('worksHead').classList.add('show');});
</script>
</body>
</html>
